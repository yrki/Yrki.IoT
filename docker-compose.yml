services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_DB: YrkiIoT
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d YrkiIoT"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./volumes/mosquitto/config:/mosquitto/config
      - ./volumes/mosquitto/data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./volumes/rabbit:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
      - nuget-cache:/root/.nuget/packages
      - ~/.nuget/NuGet/NuGet.Config:/root/.nuget/NuGet/NuGet.Config:ro
    command:
      - /bin/sh
      - -lc
      - >
        dotnet restore src/backend/Api/Api.csproj &&
        dotnet run --project src/backend/Api/Api.csproj --no-restore --urls http://0.0.0.0:8080
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DatabaseConnectionString: Host=postgres;Port=5432;Database=YrkiIoT;Username=postgres;Password=postgres
      MagicLink__FrontendBaseUrl: ${MAGIC_LINK_FRONTEND_BASE_URL:-http://localhost:8080}
      Encryption__MasterKey: ${ENCRYPTION_MASTER_KEY:-Ae+/cx56gf9Zg5ECKYl67cOnP4QpiGdQczqrSU7MYbg=}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  service:
    image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
      - nuget-cache:/root/.nuget/packages
      - ~/.nuget/NuGet/NuGet.Config:/root/.nuget/NuGet/NuGet.Config:ro
    command:
      - /bin/sh
      - -lc
      - >
        dotnet restore src/backend/Service/Service.csproj &&
        dotnet run --project src/backend/Service/Service.csproj --no-restore
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DatabaseConnectionString: Host=postgres;Port=5432;Database=YrkiIoT;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      WMBus__Enabled: "false"
      Mqtt__Enabled: "true"
      Mqtt__Host: mosquitto
      Mqtt__Port: 1883
      Mqtt__Topic: wmbus/raw
      Api__BaseUrl: http://api:8080
      Encryption__MasterKey: ${ENCRYPTION_MASTER_KEY:-Ae+/cx56gf9Zg5ECKYl67cOnP4QpiGdQczqrSU7MYbg=}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      api:
        condition: service_started

  simulator:
    image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
      - nuget-cache:/root/.nuget/packages
      - ~/.nuget/NuGet/NuGet.Config:/root/.nuget/NuGet/NuGet.Config:ro
    command:
      - /bin/sh
      - -lc
      - >
        dotnet restore src/backend/Simulator/Simulator.csproj &&
        dotnet run --project src/backend/Simulator/Simulator.csproj --no-restore
    restart: unless-stopped
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    profiles:
      - simulator

  frontend:
    build:
      context: .
      dockerfile: src/frontend/dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_started

volumes:
  nuget-cache:
