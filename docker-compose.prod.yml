services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

  frontend:
    image: yrkiiot-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  api-init:
    image: yrkiiot-api
    user: "0:0"
    volumes:
      - api-uploads:/data/uploads
    entrypoint: ["sh", "-c", "mkdir -p /data/uploads/ifc && chown -R 1654:1654 /data/uploads"]
    restart: "no"

  api:
    image: yrkiiot-api
    restart: unless-stopped
    volumes:
      - api-uploads:/data/uploads
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DatabaseConnectionString: Host=postgres;Port=5432;Database=YrkiIoT;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      MagicLink__FrontendBaseUrl: http://${DOMAIN}
      Encryption__MasterKey: ${ENCRYPTION_MASTER_KEY}
      Email__ConnectionString: ${EMAIL_CONNECTION_STRING}
      Email__SenderAddress: ${EMAIL_SENDER_ADDRESS}
      Uploads__BasePath: /data
      Prophet__BaseUrl: http://prophet:8000
      Admin__Email: ${ADMIN_EMAIL}
    depends_on:
      api-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      prophet:
        condition: service_healthy

  prophet:
    image: yrkiiot-prophet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  service:
    image: yrkiiot-service
    restart: unless-stopped
    environment:
      ConnectionStrings__DatabaseConnectionString: Host=postgres;Port=5432;Database=YrkiIoT;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Mqtt__Enabled: "${MQTT_ENABLED:-false}"
      Mqtt__Host: mosquitto
      Mqtt__Port: "1883"
      Mqtt__Topic: wmbus/raw
      Api__BaseUrl: http://api:8080
      Encryption__MasterKey: ${ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

  postgres:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_DB: YrkiIoT
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d YrkiIoT"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./volumes/mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  rabbitmq-data:
  api-uploads:
  mosquitto-data:
